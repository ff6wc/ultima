<!DOCTYPE html>
<html>
<head><title>Processor</title></head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    async function process() {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = "http://localhost:3000/logo.png";
      await new Promise(r => img.onload = r);
      
      const canvas = document.getElementById('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      
      // Loop through pixels and perform smarter Chroma Keying based on color analysis.
      // The target logo has WHITE text (R~G~B > 200) and GOLD/BROWN graphic (R > 100, G > 80, B < 80).
      // The BACKGROUND is BLUE GRID (B component is largest, typically B > R and B > G).
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i+1];
        const b = data[i+2];
        
        // If it's white text or near white text/grey borders, KEEP IT.
        const isWhite = (r > 180 && g > 180 && b > 180);
        // If it's the distinct Golden silhouette, KEEP IT.
        const isGold = (r > 120 && r > b + 30 && g > 70); 
        
        // Edge cases for gold/copper tones (darker gold)
        const isDarkGold = (r > 60 && r > b + 10 && g > 40 && b < 120);

        if (isWhite || isGold || isDarkGold) {
           // It's part of the foreground! 
           // Smooth out edge aliasing slightly.
           continue;
        } else {
           // It's the blue background grid!
           data[i + 3] = 0; // Make pixel fully transparent
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
      const dataUrl = canvas.toDataURL('image/png');
      const output = document.createElement('pre');
      output.id = "result";
      output.textContent = dataUrl;
      document.body.appendChild(output);
    }
    process();
  </script>
</body>
</html>
